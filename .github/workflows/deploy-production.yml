name: Deploy to Hostinger (Production)

on:
  push:
    branches:
      - staging

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            APP_PATH="${{ secrets.HOSTINGER_APP_PATH }}"

            # Accept either project root or public dir in HOSTINGER_APP_PATH.
            if [ -f "$APP_PATH/composer.json" ]; then
              cd "$APP_PATH"
            elif [ -f "$APP_PATH/../composer.json" ]; then
              cd "$APP_PATH/.."
            else
              echo "composer.json not found in '$APP_PATH' or its parent."
              echo "Set HOSTINGER_APP_PATH to your Laravel project root."
              exit 1
            fi

            git fetch --all
            git checkout staging
            git pull origin staging
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            php artisan migrate --force
            php artisan optimize:clear
